name: Build windows cygwin intel 64 (cygwin-latest)

on:
  workflow_dispatch:
    branches: [ master ]
jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [x86_64]    
    steps:
    - name: Install Cygwin
      uses: cygwin/cygwin-install-action@v6
      with:
        packages: |
          git
          python3
          python3-pip
          bash 
          make 
          gcc-core 
          gcc-g++ 
          wget 
          zlib-devel 
          libncurses-devel 
          libXt-devel
          libXft-devel
          libssl-devel 
          zip 
          unzip
        install-dir: C:\cygwin
        platform: ${{ matrix.arch }}
    - name: Modify PATH
      run: |
        echo "C:\cygwin\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
    - name: Verify Cygwin installation
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        echo $PATH
        which bash
        bash --version

    - name: Run your commands
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        # Your Cygwin commands here
        cygcheck -c
        make --version
        gcc --version
        
    - name: Install apt-cyg
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        wget https://raw.githubusercontent.com/transcode-open/apt-cyg/master/apt-cyg
        install apt-cyg /bin
        chmod +x /bin/apt-cyg
        apt-cyg install nano
        
    - name: Verify Python Installation
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        python3 --version
        which python3

    - name: Capture Cygwin Version
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        CYGWIN_VER=$(uname -r | grep -oE '^[0-9]\.[0-9]+')
        echo "CYGWIN_VER=$CYGWIN_VER" >> $GITHUB_ENV
        echo "Cygwin version: $CYGWIN_VER"
        CYGWIN_MACHINE=$(uname -m)
        echo "CYGWIN_MACHINE=$CYGWIN_MACHINE" >> $GITHUB_ENV
        echo "Cygwin Machine: $CYGWIN_MACHINE"

    - name: Clone MicroEmacs
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        mkdir workspace
        cd workspace
        git clone https://github.com/bjasspa/jasspa.git
        echo `pwd`
        cd ./jasspa/
        mkdir downloads
    - name: Compile cygwin-intel mec
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'    
      run: |
        echo `pwd`
        cd ./workspace/jasspa/microemacs/src
        ./build.sh -t c
    - name: Compile cygwin-intel mew
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'    
      run: |
        echo `pwd`
        cd ./workspace/jasspa/microemacs/src
        ./build.sh -t w
    - name: Create cygwin-intel binaries download
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'        
      run: |
        echo `pwd`
        cd ./workspace/jasspa/microemacs/bin
        mv cygwin3-intel64-gcc13 cygwin3-intel64
        rm ./.gitignore
        cd ..
        mv release_readme.txt readme.txt
        export MEVER=`./bin/cygwin3-intel64/mec -p @contribs/ver.emf`
        zip -r ../downloads/Jasspa_MicroEmacs_${MEVER}_bin_cygwin_intel_binaries bin LICENSE readme.txt

    - name: Create cygwin-intel mesc
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'            
      run: |
        echo `pwd`
        cd ./workspace/jasspa
        pwd
        export MEVER=`./microemacs/bin/cygwin3-intel64/mec.exe -p @microemacs/contribs/ver.emf`
        echo $MEVER
        echo starting
        ls
        cd ./microemacs/mesingle
        pwd
        mkdir -p bin/cygwin3-intel64
        ls
        echo files
        ls ../bin/cygwin3-intel64/mec.exe 
        ls ../bin/cygwin3-intel64/tfs.exe
        echo `../bin/cygwin3-intel64/mec.exe -V`
        echo `../bin/cygwin3-intel64/mec.exe -p "@./mesgen" -h`
        echo `ls -lt ../bin/cygwin3-intel64/tfs.exe`
        echo `ls -R bin/*`
        PATH=:../bin/cygwin3-intel64/:${PATH} bash mesgen.sh -d -p ../bin/cygwin3-intel64/mec.exe -o bin/cygwin3-intel64/mesc.exe
        #../bin/cygwin3-intel64/mec.exe -p "@./mesgen" -f -p ../bin/cygwin3-intel64/mec.exe -t ../bin/cygwin3-intel64/tfs.exe -o bin/cygwin3-intel64/mesc.exe
        ls -l bin/*/*
        cp ../LICENSE ./
        cp ../readme.txt ./
        ls
        zip -r ../../downloads/Jasspa_MicroEmacs_${MEVER}_abin_cygwin_intel_mesc bin LICENSE readme.txt

    - name: Create cygwin-intel mesw
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'            
      run: |
        cd ./workspace/jasspa
        export MEVER=`./microemacs/bin/cygwin3-intel64/mec -p @microemacs/contribs/ver.emf`
        cd ./microemacs/mesingle
        rm -rf bin/cygwin3-intel64
        mkdir -p bin/cygwin3-intel64
        ../bin/cygwin3-intel64/mec.exe -p "@./mesgen" -f -p ../bin/cygwin3-intel64/mew.exe -t ../bin/cygwin3-intel64/tfs.exe -o bin/cygwin3-intel64/mesw.exe
        cp ../LICENSE ./
        cp ../readme.txt ./
        zip -r ../../downloads/Jasspa_MicroEmacs_${MEVER}_abin_cygwin_intel_mesw bin LICENSE readme.txt

