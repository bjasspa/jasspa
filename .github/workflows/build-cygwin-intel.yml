name: Build cygwin intel 64 (windows-latest)

on:
  workflow_dispatch:
    inputs:
      refToBuild:
        description: 'Branch, tag or commit SHA1 to build'
        default: ''
        required: false
        type: string

      refToHelpAsset:
        description: 'Run-ID of build with help-ehf asset (not used)'
        default: ''
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    name: Build Cygwin on windows-latest intel

    steps:
    - name: Find VS
      shell: pwsh
      run: |
        $installationPath = Get-VSSetupInstance `
          | Select-VSSetupInstance -Require Microsoft.VisualStudio.Workload.NativeDesktop -Latest `
          | Select-Object -ExpandProperty InstallationPath
        Write-Output "VSDEVCMD=${installationPath}\Common7\Tools\VsDevCmd.bat" `
          | Out-File -FilePath "${Env:GITHUB_ENV}" -Append
        cat "${Env:GITHUB_ENV}"

    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.refToBuild }}
       
    - name: Install Cygwin
      uses: cygwin/cygwin-install-action@v6
      with:
        packages: |
          make 
          gcc-core 
          libncurses-devel 
          libXt-devel
          libXft-devel
          libXpm-devel
          libssl-devel 

    - name: Verify Cygwin installation
      shell: D:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        CYGWIN_VER=$(uname -r | grep -oE '^[0-9]\.[0-9]+')
        echo "CYGWIN_VER=$CYGWIN_VER" >> $GITHUB_ENV
        echo "Cygwin version: $CYGWIN_VER"
        CYGWIN_MACHINE=$(uname -m)
        echo "CYGWIN_MACHINE=$CYGWIN_MACHINE" >> $GITHUB_ENV
        echo "Cygwin Machine: $CYGWIN_MACHINE"
        echo `pwd`
        echo $PATH
        which bash
        bash --version
        cygcheck -c
        make --version
        gcc --version
        ls -l /cygdrive/d/cygwin/bin

    - name: Compile cygwin-intel mec
      shell: D:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        cd /cygdrive/d/a/jasspa/jasspa
        cd ./microemacs/src
        ./build.sh -t c

    - name: Compile cygwin-intel mew
      shell: D:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        cd /cygdrive/d/a/jasspa/jasspa
        cd ./microemacs/src
        ./build.sh -t w

    - name: Compile windows-intel mec
      shell: pwsh
      run: |
        & "${Env:COMSPEC}" /s /c "`"${Env:VSDEVCMD}`" -arch=x86 -host_arch=x64 -no_logo && set" `
          | % { , ($_ -Split '=', 2) } `
          | % { [System.Environment]::SetEnvironmentVariable($_[0], $_[1]) }
        nmake -f winmsvc.mak BTYP=c
      working-directory: ./microemacs/src

    - name: Create cygwin-intel binaries download
      shell: pwsh
      run: |
        mkdir -Path downloads
        mkdir -Path packages
        cd .\microemacs\bin
        Remove-Item .gitignore
        Rename-Item -Path cygwin3-intel64-gcc13 -NewName cygwin3-intel64
        Rename-Item -Path windows100-intel32-msvc17 -NewName windows100-intel32
        Move-Item -Path windows100-intel32 -Destination ..
        cd ..
        Rename-Item -Path release_readme.txt -NewName readme.txt
        $env:MEVER=$(.\windows100-intel32\mec -p @contribs/ver.emf)
        Compress-Archive -Path bin,LICENSE,readme.txt -DestinationPath ..\downloads\Jasspa_MicroEmacs_${env:MEVER}_bin_cygwin_intel_binaries

    - name: Create cygwin-intel mesc
      shell: pwsh
      run: |
        cd .\microemacs
        $env:MEVER=$(.\windows100-intel32\mec -p @contribs/ver.emf)
        cd .\mesingle
        mkdir -Path bin\cygwin-intel64
        ..\windows100-intel32\mec.exe -p "@./mesgen" -f -p ..\bin\cygwin3-intel64\mec.exe -t ..\windows100-intel32\tfs.exe -o bin\cygwin-intel64\mesc.exe
        Copy-Item -Path ..\LICENSE -Destination .
        Copy-Item -Path ..\readme.txt -Destination .
        Compress-Archive -Path bin,LICENSE,readme.txt -DestinationPath ..\..\downloads\Jasspa_MicroEmacs_${env:MEVER}_abin_cygwin_intel_mesc

    - name: Create cygwin-intel mesw
      shell: pwsh
      run: |
        cd .\microemacs
        $env:MEVER=$(.\windows100-intel32\mec -p @contribs/ver.emf)
        cd .\mesingle
        Remove-Item bin\cygwin-intel64\mesc.exe
        ..\windows100-intel32\mec.exe -p "@./mesgen" -f -p ..\bin\cygwin3-intel64\mew.exe -t ..\windows100-intel32\tfs.exe -o bin\cygwin-intel64\mesw.exe
        Copy-Item -Path ..\LICENSE -Destination .
        Copy-Item -Path ..\readme.txt -Destination .
        Compress-Archive -Path bin,LICENSE,readme.txt -DestinationPath ..\..\downloads\Jasspa_MicroEmacs_${env:MEVER}_abin_cygwin_intel_mesw

    - name: Create cygwin-intel openssl download
      shell: pwsh
      run: |
        cd .\microemacs
        $env:MEVER=$(.\windows100-intel32\mec -p @contribs/ver.emf)
        mkdir -Path tfs\bin\cygwin3-intel64
        Copy-Item -Path D:\cygwin\bin\cygssl-3.dll -Destination tfs\bin\cygwin3-intel64
        Copy-Item -Path D:\cygwin\bin\cygcrypto-3.dll -Destination tfs\bin\cygwin3-intel64
        cd tfs
        Compress-Archive -Path bin -DestinationPath ..\..\downloads\Jasspa_MicroEmacs_${env:MEVER}_bin_cygwin_intel_openssl.zip
        cd ..
        .\windows100-intel32\tfs ../packages/Jasspa_MicroEmacs_${env:MEVER}_openssl_cygwin3-intel64.tfs tfs

    - name: Upload cygwin-intel downloads
      uses: actions/upload-artifact@v6
      with: 
        name: cygwin-intel-downloads
        path: downloads

    - name: Upload cygwin-intel packages
      uses: actions/upload-artifact@v6
      with: 
        name: cygwin-intel-packages
        path: packages
