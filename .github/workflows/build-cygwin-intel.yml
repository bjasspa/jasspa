name: Build windows cygwin intel 64 (cygwin-latest)

on:
  workflow_dispatch:
    inputs:
      refToBuild:
        description: 'Branch, tag or commit SHA1 to build'
        default: ''
        required: false
        type: string

      refToHelpAsset:
        description: 'Run-ID of build with help-ehf asset (not used)'
        default: ''
        required: false
        type: string

jobs:
  build:
    runs-on: windows-latest
    name: Build on ${{ runner.os }} ${{ runner.arch }}

    steps:
    - name: Find VS
      shell: pwsh
      run: |
        $installationPath = Get-VSSetupInstance `
          | Select-VSSetupInstance -Require Microsoft.VisualStudio.Workload.NativeDesktop -Latest `
          | Select-Object -ExpandProperty InstallationPath
        Write-Output "VSDEVCMD=${installationPath}\Common7\Tools\VsDevCmd.bat" `
          | Out-File -FilePath "${Env:GITHUB_ENV}" -Append
        cat "${Env:GITHUB_ENV}"

    - name: Install Cygwin
      uses: cygwin/cygwin-install-action@v6
      with:
        packages: |
          git
          bash 
          make 
          gcc-core 
          wget 
          zlib-devel 
          libncurses-devel 
          libXt-devel
          libXft-devel
          libXpm-devel
          libssl-devel 
          zip 
          unzip
        install-dir: C:\cygwin

    - name: Checkout code
      uses: actions/checkout@v6
      with:
        ref: ${{ inputs.refToBuild }}
       
    - name: Modify PATH
      run: |
        echo "C:\cygwin\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        
    - name: Verify Cygwin installation
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        echo $PATH
        which bash
        bash --version
        cygcheck -c
        make --version
        gcc --version
        python3 --version
        which python3

    - name: Capture Cygwin Version
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'
      run: |
        CYGWIN_VER=$(uname -r | grep -oE '^[0-9]\.[0-9]+')
        echo "CYGWIN_VER=$CYGWIN_VER" >> $GITHUB_ENV
        echo "Cygwin version: $CYGWIN_VER"
        CYGWIN_MACHINE=$(uname -m)
        echo "CYGWIN_MACHINE=$CYGWIN_MACHINE" >> $GITHUB_ENV
        echo "Cygwin Machine: $CYGWIN_MACHINE"

    - name: Compile cygwin-intel mec
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'    
      run: |
        echo `pwd`
        mkdir downloads
        mkdir packages
        cd ./microemacs/src
        ./build.sh -t c

    - name: Compile cygwin-intel mew
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'    
      run: |
        cd ./microemacs/src
        ./build.sh -t w

    - name: Create cygwin-intel binaries download
      shell: C:\cygwin\bin\bash.exe --login --norc -eo pipefail -o igncr '{0}'        
      run: |
        cd ./microemacs/bin
        mv cygwin3-intel64-gcc13 cygwin3-intel64
        rm ./.gitignore
        cd ..
        mv release_readme.txt readme.txt
        export MEVER=`./bin/cygwin3-intel64/mec -p @contribs/ver.emf`
        zip -r ../downloads/Jasspa_MicroEmacs_${MEVER}_bin_cygwin_intel_binaries bin LICENSE readme.txt

    - name: Compile windows-intel mec
      shell: pwsh
      run: |
        & "${Env:COMSPEC}" /s /c "`"${Env:VSDEVCMD}`" -arch=x86 -host_arch=x64 -no_logo && set" `
          | % { , ($_ -Split '=', 2) } `
          | % { [System.Environment]::SetEnvironmentVariable($_[0], $_[1]) }
        nmake -f winmsvc.mak BTYP=c
      working-directory: c:/cygwin/home/runneradmin/microemacs/src

    - name: Create cygwin-intel mesc
      shell: pwsh
      run: |
        cd .\microemacs
        $env:MEVER=$(.\bin\windows100-intel32-msvc17\mec -p @contribs/ver.emf)
        cd .\mesingle
        mkdir -Path bin\cygwin-intel64
        ..\bin\windows100-intel32-msvc17\mec.exe -p "@./mesgen" -f -p ..\bin\cygwin3-intel64\mec.exe -t ..\bin\windows100-intel32-msvc17\tfs.exe -o bin\cygwin-intel64\mesc.exe
        Copy-Item -Path ..\LICENSE -Destination .
        Copy-Item -Path ..\readme.txt -Destination .
        Compress-Archive -Path bin,LICENSE,readme.txt -DestinationPath ..\..\downloads\Jasspa_MicroEmacs_${env:MEVER}_abin_cygwin_intel_mesc
      working-directory: c:/cygwin/home/runneradmin/

    - name: Create cygwin-intel mesw
      shell: pwsh
      run: |
        cd .\microemacs
        $env:MEVER=$(.\bin\windows100-intel32-msvc17\mec -p @contribs/ver.emf)
        cd .\mesingle
        Remove-Item bin\cygwin-intel64\mesc.exe
        ..\bin\windows100-intel32-msvc17\mec.exe -p "@./mesgen" -f -p ..\bin\cygwin3-intel64\mew.exe -t ..\bin\windows100-intel32-msvc17\tfs.exe -o bin\cygwin-intel64\mesw.exe
        Copy-Item -Path ..\LICENSE -Destination .
        Copy-Item -Path ..\readme.txt -Destination .
        Compress-Archive -Path bin,LICENSE,readme.txt -DestinationPath ..\..\downloads\Jasspa_MicroEmacs_${env:MEVER}_abin_cygwin_intel_mesw
      working-directory: c:/cygwin/home/runneradmin/

    - name: Upload cygwin-intel downloads
      uses: actions/upload-artifact@v6
      with: 
        name: cygwin-intel-downloads
        path: c:\cygwin\home\runneradmin\downloads

